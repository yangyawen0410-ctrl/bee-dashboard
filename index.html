<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>店员蜜蜂扫码核销进展 · 网页预览</title>
<style>
  :root {
    --primary: #07c160;
    --up: #f5564a;
    --down: #21a366;
    --text-1: #1f2329;
    --text-2: #646a73;
    --text-3: #8f959e;
    --bg: #f3f5f7;
    --card: #ffffff;
    --border: #eceef1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e3e6ea;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    color: var(--text-1);
    font-size: 14px;
    padding: 24px 12px;
    -webkit-font-smoothing: antialiased;
  }
  /* 手机外壳 */
  .phone {
    width: 390px;
    max-width: 100%;
    margin: 0 auto;
    background: var(--bg);
    border-radius: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    overflow: hidden;
  }
  .navbar {
    background: var(--primary);
    color: #fff;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    padding: 14px 0 12px;
  }
  .scroll {
    height: 760px;
    max-height: calc(100vh - 90px);
    overflow-y: auto;
    padding: 12px 12px 40px;
  }
  /* 顶部说明 */
  .notice {
    display: flex;
    background: #fff7e6;
    border: 1px solid #ffe1a8;
    border-radius: 8px;
    padding: 10px 11px;
    margin-bottom: 10px;
  }
  .notice .ico { color: #fa8c16; margin-right: 6px; font-size: 13px; line-height: 19px; }
  .notice .txt { flex: 1; font-size: 12px; color: #8a5a00; line-height: 19px; }

  /* 筛选 */
  .filter-bar {
    display: flex;
    align-items: stretch;
    background: var(--card);
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 8px;
  }
  .filter-item { flex: 1; padding: 2px 6px; border-right: 1px solid var(--border); }
  .filter-item .lab { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
  .filter-item select {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 13px;
    color: var(--text-2);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .filter-item select.active { color: var(--primary); font-weight: 600; }
  .filter-reset {
    display: flex; align-items: center; padding: 0 8px;
    font-size: 12px; color: var(--text-3); cursor: pointer;
  }

  /* 搜索框 */
  .search-hint { font-size: 11px; color: var(--text-3); margin: 2px 2px 6px; }
  .search-bar {
    display: flex; align-items: center;
    background: var(--card);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
  .search-bar .s-ico { color: var(--text-3); font-size: 14px; margin-right: 6px; }
  .search-bar input {
    flex: 1; border: none; outline: none; background: transparent;
    font-size: 13px; color: var(--text-1);
  }
  .search-bar input::placeholder { color: var(--text-3); }
  .search-bar .s-clear {
    display: none; color: var(--text-3); font-size: 15px; cursor: pointer;
    padding: 0 4px; line-height: 1;
  }
  .search-bar.has-kw .s-clear { display: block; }

  /* 高销分层标签 */
  .tier { font-size: 10px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; font-weight: 600; }
  .tier-3w { background: #fff1f0; color: #cf1322; }
  .tier-2w { background: #fff7e6; color: #d46b08; }
  .tier-1w { background: #f6ffed; color: #389e0d; }
  .tier-other { background: #f2f3f5; color: #8f959e; }

  /* Tab */
  .tabs { display: flex; background: var(--card); border-radius: 8px; padding: 4px; margin-bottom: 8px; }
  .tab { flex: 1; text-align: center; padding: 9px 0; font-size: 14px; color: var(--text-2); border-radius: 6px; cursor: pointer; }
  .tab.on { background: var(--primary); color: #fff; font-weight: 600; }

  .meta-row { display: flex; align-items: center; margin: 2px 2px 8px; }
  .badge-mock { font-size: 10px; color: #fa8c16; background: #fff3e0; border-radius: 4px; padding: 1px 6px; margin-right: 8px; }
  .meta-time { font-size: 11px; color: var(--text-3); }
  .count-row { font-size: 12px; color: var(--text-3); margin: 2px 2px 8px; }

  /* 卡片 */
  .card { background: var(--card); border-radius: 10px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .poi-name { font-size: 15px; font-weight: 600; flex: 1; margin-right: 8px; }
  .grp-stores { font-size: 12px; color: var(--text-3); }

  .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .level-top { background: #fff1f0; color: #cf1322; }
  .level-high { background: #fff7e6; color: #d46b08; }
  .level-mid { background: #e6f7ff; color: #0958d9; }
  .level-low { background: #f6ffed; color: #389e0d; }
  .level-none { background: #f2f3f5; color: #8f959e; }

  .sub-row { display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .sub { font-size: 12px; color: var(--text-2); }
  .dot { color: var(--text-3); margin: 0 5px; }
  .count-type { margin-left: auto; color: var(--text-3); }

  .bar-wrap { display: flex; align-items: center; margin-bottom: 9px; }
  .bar-track { flex: 1; height: 15px; background: #f2f3f5; border-radius: 8px; overflow: hidden; margin-right: 9px; }
  .bar-track.sm { height: 11px; border-radius: 6px; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, #95e1b8, #07c160); border-radius: 8px; transition: width .3s; }
  .bar-fill.purple { background: linear-gradient(90deg, #c4b5fd, #8b5cf6); }
  .bar-num { min-width: 58px; text-align: right; font-size: 14px; font-weight: 600; }

  .kv-row { display: flex; }
  .kv { flex: 1; display: flex; align-items: baseline; }
  .kv-label { font-size: 12px; color: var(--text-3); margin-right: 6px; }
  .kv-val { font-size: 13px; font-weight: 500; }
  .up { color: var(--up); }
  .down { color: var(--down); }

  .metric-line { display: flex; align-items: center; margin-bottom: 8px; }
  .metric-label { width: 72px; font-size: 12px; color: var(--text-2); }
  .metric-val { min-width: 52px; text-align: right; font-size: 13px; font-weight: 600; margin-left: 9px; }

  .grid { display: flex; margin-top: 4px; border-top: 1px solid var(--border); padding-top: 10px; }
  .grid-cell { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .g-num { font-size: 15px; font-weight: 600; }
  .g-label { font-size: 11px; color: var(--text-3); margin-top: 3px; }

  .empty { text-align: center; color: var(--text-3); padding: 50px 0; font-size: 13px; }
  .footer { text-align: center; font-size: 11px; color: var(--text-3); margin-top: 14px; }

  /* 导航栏返回按钮 */
  .navbar { position: relative; }
  .nav-back {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 14px; font-weight: 400; cursor: pointer; opacity: .95;
  }
  .nav-back.hide { display: none; }

  /* 右上角用户标识 */
  .user-badge {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    display: none; align-items: center; font-size: 12px; color: #fff;
    background: rgba(255,255,255,0.18); border-radius: 14px; padding: 3px 9px 3px 3px;
  }
  .user-badge.show { display: inline-flex; }
  .user-badge .ua-av {
    width: 20px; height: 20px; border-radius: 50%; margin-right: 6px;
    background: #fff; color: var(--primary); font-weight: 700;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    overflow: hidden;
  }
  .user-badge .ua-av img { width: 100%; height: 100%; object-fit: cover; }

  /* 实时数据角标 */
  .badge-live { font-size: 10px; color: #07c160; background: #e7f8ee; border-radius: 4px; padding: 1px 6px; margin-right: 8px; }

  /* loading 动效 */
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px 0; color: var(--text-3); font-size: 13px; }
  .spinner {
    width: 18px; height: 18px; border: 2px solid #d9e8df; border-top-color: var(--primary);
    border-radius: 50%; animation: spin .7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 城市选择页 */
  .city-hero { text-align: center; padding: 26px 0 22px; }
  .city-hero-title { font-size: 19px; font-weight: 700; color: var(--text-1); }
  .city-hero-sub { font-size: 13px; color: var(--text-3); margin-top: 8px; }
  .city-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .city-card {
    background: var(--card); border-radius: 12px; padding: 20px 14px;
    cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    border: 1px solid var(--border); transition: transform .15s, box-shadow .15s;
  }
  .city-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(7,193,96,0.18); border-color: var(--primary); }
  .city-card .c-top { display: flex; align-items: center; margin-bottom: 10px; }
  .city-card .c-dot {
    width: 34px; height: 34px; border-radius: 9px; margin-right: 10px;
    background: linear-gradient(135deg, #95e1b8, #07c160);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px; font-weight: 700;
  }
  .city-card .c-name { font-size: 16px; font-weight: 600; color: var(--text-1); }
  .city-card .c-meta { font-size: 11px; color: var(--text-3); line-height: 1.6; }
  .city-card .c-go { font-size: 12px; color: var(--primary); margin-top: 8px; font-weight: 600; }
</style>

function num(x){ const n=Number(x); return Number.isFinite(n)?n:0; }
function fmtInt(x){ return Math.round(num(x)).toLocaleString('en-US'); }
function fmtDelta(x){ const n=Math.round(num(x)); return (n>0?'+':'')+n.toLocaleString('en-US'); }
function fmtPct(r){ return (num(r)*100).toFixed(1)+'%'; }
function ratePct(r){ return Math.max(0,Math.min(100,Math.round(num(r)*100))); }
function barPct(v,max){ const m=num(max); if(m<=0)return 0; return Math.max(2,Math.min(100,Math.round(num(v)/m*100))); }

function parseLevel(text){
  const t = String(text||'');
  if(t.includes('问鼎巅峰')||t.includes('聚力乘风')) return 'top';
  if(t.includes('全力以赴')) return 'high';
  if(t.includes('稳步进阶')) return 'mid';
  if(t.includes('达标起步')) return 'low';
  return 'none';
}
function tierClass(tier){
  const t = String(tier||'');
  if(t.includes('3w')) return 'tier-3w';
  if(t.includes('2w')) return 'tier-2w';
  if(t.includes('1w')) return 'tier-1w';
  return 'tier-other';
}
// 关键词模糊匹配：门店名称 / poi_id / BD 销售名称
function matchKw(r){
  const kw = state.kw.trim().toLowerCase();
  if(!kw) return true;
  const name = String(r.poiName||'').toLowerCase();
  const pid = String(r.poiId||'').toLowerCase();
  const bd = String(r.bd||'').toLowerCase();
  return name.includes(kw) || pid.includes(kw) || bd.includes(kw);
}
// 各 Tab 搜索配置：提示文字 + 输入框 placeholder
const SEARCH_CFG = {
  detail:    { hint: '可搜索：门店名称 / poi_id / BD姓名', ph: '搜索门店名称 / poi_id / BD姓名' },
  summary:   { hint: '可搜索：BDM名称 / 小组名称',        ph: '搜索 BDM / 小组名称（如 烟台-2）' },
  highsales: { hint: '可搜索：门店名称 / poi_id / BD姓名', ph: '搜索门店名称 / poi_id / BD姓名' }
};
function updateSearchHint(){
  const cfg = SEARCH_CFG[state.tab] || SEARCH_CFG.detail;
  document.getElementById('search-hint').textContent = cfg.hint;
  document.getElementById('f-kw').placeholder = cfg.ph;
}

// ---- 初始化筛选项 ----
function initFilters(){
  const bdmSet = new Set(), bdSet = new Set();
  STORE_DATA.forEach(r => { if(r.bdm) bdmSet.add(r.bdm); if(r.bd) bdSet.add(r.bd); });
  const bdmList = [...bdmSet].sort();
  const bdList = [...bdSet].sort();
  fillSelect('f-bdm', bdmList);
  fillSelect('f-bd', bdList);
  fillSelect('f-group', bdmList); // 该看板小组=BDM 字段
}
function fillSelect(id, list){
  const el = document.getElementById(id);
  el.innerHTML = '<option value="">全部</option>' + list.map(v=>`<option value="${v}">${v}</option>`).join('');
}

function onFilter(){
  state.bdm = document.getElementById('f-bdm').value;
  state.bd = document.getElementById('f-bd').value;
  state.group = document.getElementById('f-group').value;
  ['f-bdm','f-bd','f-group'].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.toggle('active', !!el.value);
  });
  render();
}
function resetFilter(){
  state.bdm=state.bd=state.group='';
  ['f-bdm','f-bd','f-group'].forEach(id=>{ document.getElementById(id).value=''; document.getElementById(id).classList.remove('active'); });
  render();
}
function switchTab(tab){
  state.tab = tab;
  document.getElementById('tab-detail').classList.toggle('on', tab==='detail');
  document.getElementById('tab-summary').classList.toggle('on', tab==='summary');
  document.getElementById('tab-highsales').classList.toggle('on', tab==='highsales');
  updateSearchHint();
  render();
}
function onSearch(){
  state.kw = document.getElementById('f-kw').value || '';
  document.getElementById('search-bar').classList.toggle('has-kw', !!state.kw.trim());
  render();
}
function clearSearch(){
  state.kw = '';
  document.getElementById('f-kw').value = '';
  document.getElementById('search-bar').classList.remove('has-kw');
  render();
}

// ---- 渲染 ----
function render(){
  if(state.tab==='detail') renderDetail();
  else if(state.tab==='summary') renderSummary();
  else renderHighsales();
}

function renderDetail(){
  let list = STORE_DATA.filter(r=>{
    if(state.bdm && r.bdm!==state.bdm) return false;
    if(state.bd && r.bd!==state.bd) return false;
    if(state.group && r.bdm!==state.group) return false;
    if(!matchKw(r)) return false;
    return true;
  });
  list = list.slice().sort((a,b)=>num(b.today)-num(a.today));
  const max = list.reduce((m,r)=>Math.max(m,num(r.today)),0);
  document.getElementById('count-row').textContent = `共 ${list.length} 家门店（按今日扫码降序）`;
  const box = document.getElementById('list');
  if(!list.length){ box.innerHTML='<div class="empty">暂无符合条件的门店</div>'; return; }
  box.innerHTML = list.map(r=>{
    const lv = parseLevel(r.standard);
    const up = num(r.delta)>0, down = num(r.delta)<0;
    return `<div class="card">
      <div class="card-head">
        <span class="poi-name">${r.poiName}</span>
        <span class="tag level-${lv}">${r.standard||'-'}</span>
      </div>
      <div class="sub-row">
        <span class="sub">${r.bdm||''}</span><span class="dot">·</span>
        <span class="sub">${r.bd||''}</span><span class="dot">·</span>
        <span class="sub">${r.category||''}</span>
        <span class="sub count-type">${r.countType||''}</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-track"><div class="bar-fill" style="width:${barPct(r.today,max)}%"></div></div>
        <span class="bar-num">${fmtInt(r.today)}</span>
      </div>
      <div class="kv-row">
        <div class="kv"><span class="kv-label">昨日同期</span><span class="kv-val">${fmtInt(r.yesterday)}</span></div>
        <div class="kv"><span class="kv-label">增减量</span><span class="kv-val ${up?'up':''} ${down?'down':''}">${fmtDelta(r.delta)}</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderSummary(){
  let list = SUMMARY_DATA.filter(r=>{
    const g = state.group || state.bdm;
    if(g && r.group!==g) return false;
    const kw = state.kw.trim().toLowerCase();
    if(kw && !String(r.group||'').toLowerCase().includes(kw)) return false;
    return true;
  });
  list = list.slice().sort((a,b)=>num(b.standardStores)-num(a.standardStores));
  document.getElementById('count-row').textContent = `共 ${list.length} 个小组（按达标门店数降序）`;
  const box = document.getElementById('list');
  if(!list.length){ box.innerHTML='<div class="empty">暂无符合条件的小组</div>'; return; }
  box.innerHTML = list.map(r=>{
    const up = num(r.delta)>0, down = num(r.delta)<0;
    return `<div class="card">
      <div class="card-head">
        <span class="poi-name">${r.group}</span>
        <span class="grp-stores">${r.storeCount} 家门店</span>
      </div>
      <div class="metric-line">
        <span class="metric-label">扫码动销率</span>
        <div class="bar-track sm"><div class="bar-fill purple" style="width:${ratePct(r.activeRate)}%"></div></div>
        <span class="metric-val">${fmtPct(r.activeRate)}</span>
      </div>
      <div class="metric-line">
        <span class="metric-label">达标占比</span>
        <div class="bar-track sm"><div class="bar-fill" style="width:${ratePct(r.standardRate)}%"></div></div>
        <span class="metric-val">${fmtPct(r.standardRate)}</span>
      </div>
      <div class="grid">
        <div class="grid-cell"><span class="g-num">${r.activeStores}</span><span class="g-label">动销门店</span></div>
        <div class="grid-cell"><span class="g-num">${r.standardStores}</span><span class="g-label">达标门店</span></div>
        <div class="grid-cell"><span class="g-num">${fmtInt(r.today)}</span><span class="g-label">今日扫码</span></div>
        <div class="grid-cell"><span class="g-num ${up?'up':''} ${down?'down':''}">${fmtDelta(r.delta)}</span><span class="g-label">环比增量</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderHighsales(){
  let list = HIGHSALES_DATA.filter(r=>{
    if(state.bdm && r.bdm!==state.bdm) return false;
    if(state.bd && r.bd!==state.bd) return false;
    if(state.group && r.bdm!==state.group) return false;
    if(!matchKw(r)) return false;
    return true;
  });
  list = list.slice().sort((a,b)=>num(b.today)-num(a.today));
  const max = list.reduce((m,r)=>Math.max(m,num(r.today)),0);
  document.getElementById('count-row').textContent = `共 ${list.length} 家高销门店（按今日扫码降序）`;
  const box = document.getElementById('list');
  if(!list.length){ box.innerHTML='<div class="empty">暂无符合条件的高销门店</div>'; return; }
  box.innerHTML = list.map(r=>{
    return `<div class="card">
      <div class="card-head">
        <span class="poi-name">${r.poiName}</span>
        <span class="tier ${tierClass(r.tier)}">${r.tier||'-'}</span>
      </div>
      <div class="sub-row">
        <span class="sub">${r.bdm||''}</span><span class="dot">·</span>
        <span class="sub">${r.bd||''}</span>
        <span class="sub count-type">${r.countType||''}</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-track"><div class="bar-fill purple" style="width:${barPct(r.today,max)}%"></div></div>
        <span class="bar-num">${fmtInt(r.today)}</span>
      </div>
      <div class="kv-row">
        <div class="kv"><span class="kv-label">核销poi_id</span><span class="kv-val" style="font-size:11px;color:var(--text-3)">${r.poiId}</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderCityGrid(){
  document.getElementById('city-grid').innerHTML = CITIES.map((c,i)=>`
    <div class="city-card" onclick="selectCity(${i})">
      <div class="c-top">
        <span class="c-dot">${c.name.charAt(0)}</span>

function selectCity(i){
  currentCity = CITIES[i];
  document.getElementById('nav-title').textContent = `${currentCity.name} · 扫码进展`;
  document.getElementById('nav-back').classList.remove('hide');
  document.getElementById('screen-city').style.display = 'none';
  document.getElementById('screen-query').style.display = 'block';
  resetFilter();
  clearSearch();
  state.tab = 'detail';
  document.getElementById('tab-detail').classList.add('on');
  document.getElementById('tab-summary').classList.remove('on');
  document.getElementById('tab-highsales').classList.remove('on');

function backToCity(){
  document.getElementById('screen-query').style.display = 'none';
  document.getElementById('screen-city').style.display = 'block';
  document.getElementById('nav-title').textContent = '店员蜜蜂扫码进展';

const BITABLE_APP_TOKEN = 'NEeMbt9PTat8tMsjTpGcVH4Dnlf';
const LARK_APP_ID = 'cli_aabfbe06ae789ce1';
function inLark(){
  const ua = (navigator.userAgent||'').toLowerCase();
  return !!(window.h5sdk||window.tt) && (ua.includes('lark')||ua.includes('feishu')||!!window.h5sdk);
}
function setUser(name){
  const el = document.getElementById('user-badge');
  el.innerHTML = `<span class="ua-av">${(name||'登').charAt(0)}</span>${name||'已登录'}`;
  el.classList.add('show');
}
// 飞书 JSAPI 免登：h5sdk.ready → tt.requestAuthCode 拿 code，真实场景需后端用 code 换取用户信息
function larkAuth(){
  if(!inLark()||!window.h5sdk){ setUser('演示用户'); return; }
  try{
    window.h5sdk.ready(function(){
      tt.requestAuthCode({ appId: LARK_APP_ID,
        success: function(){ setUser('飞书用户'); },
        fail: function(){ setUser('已登录'); } });
    });
    window.h5sdk.error && window.h5sdk.error(function(){ setUser('演示用户'); });
  }catch(e){ setUser('演示用户'); }
}

// ---- 多维表格实时数据（loading + fallback）----
function showLoading(b){
  document.getElementById('loading').style.display = b ? 'flex' : 'none';
  document.getElementById('list').style.display = b ? 'none' : 'block';
}
function setDataSource(live){
  const b = document.getElementById('src-badge');
  b.textContent = live ? '实时数据' : '演示数据';
  b.className = live ? 'badge-live' : 'badge-mock';
  const d = new Date(), q = n => n<10?'0'+n:''+n;
  document.getElementById('meta-time').textContent = `数据更新于 ${d.getMonth()+1}-${q(d.getDate())} ${q(d.getHours())}:${q(d.getMinutes())}`;
}
// 按城市读取多维表格（门店明细/BDM汇总/高销门店三表，按城市字段过滤）。
// 真实接入：多维表格插件用 @lark-base-open/js-sdk；或后端用 tenant_access_token 调
// bitable/v1/apps/NEeMbt9PTat8tMsjTpGcVH4Dnlf/tables/{tableId}/records（token 不可暴露前端）。
// 演示阶段无可用令牌 → 主动 fallback 内嵌 mock。
function fetchCityData(city){
  return new Promise(function(resolve){ setTimeout(function(){ resolve({live:false}); }, 500); });
}
function loadCityData(city){
  showLoading(true);
  fetchCityData(city).then(function(r){
    setDataSource(!!r.live); showLoading(false); render();
  }).catch(function(){ setDataSource(false); showLoading(false); render(); });
}

const p = n => n<10?'0'+n:''+n;
document.getElementById('meta-time').textContent = `更新于 ${now.getMonth()+1}-${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}`;

updateSearchHint();
render();
renderCityGrid();
document.getElementById('nav-back').classList.add('hide'); // 首页（城市选择）隐藏返回按钮
</script>
